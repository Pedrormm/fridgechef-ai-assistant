name: Apply saved inventory runtime hotfix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-saved-inventory-runtime-hotfix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Apply the deterministic runtime fix
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path("streamlit_app/app.py")
          app_source = app_path.read_text(encoding="utf-8")
          old_expander = '        with st.expander(title, expanded=initially_expanded):\n'
          new_expander = (
              '        with st.expander(\n'
              '            title,\n'
              '            expanded=initially_expanded,\n'
              '            key=f"{key_scope}_expander",\n'
              '            width="stretch",\n'
              '        ):\n'
          )
          if new_expander not in app_source:
              if app_source.count(old_expander) != 1:
                  raise RuntimeError("Expected exactly one saved-inventory expander call to patch.")
              app_source = app_source.replace(old_expander, new_expander, 1)
              app_path.write_text(app_source, encoding="utf-8")

          test_path = Path("tests/test_saved_inventory_expander.py")
          test_source = test_path.read_text(encoding="utf-8")
          old_assertions = (
              '    expanded_value = _keyword_value(expander_call, "expanded")\n'
              '    assert isinstance(expanded_value, ast.Name)\n'
              '    assert expanded_value.id == "initially_expanded"\n'
          )
          new_assertions = old_assertions + (
              '\n'
              '    key_value = _keyword_value(expander_call, "key")\n'
              '    assert isinstance(key_value, ast.JoinedStr)\n'
              '    assert any(\n'
              '        isinstance(value, ast.FormattedValue)\n'
              '        and isinstance(value.value, ast.Name)\n'
              '        and value.value.id == "key_scope"\n'
              '        for value in key_value.values\n'
              '    )\n'
          )
          if new_assertions not in test_source:
              if test_source.count(old_assertions) != 1:
                  raise RuntimeError("Expected the saved-inventory expander assertions once.")
              test_source = test_source.replace(old_assertions, new_assertions, 1)
              test_path.write_text(test_source, encoding="utf-8")

          runtime_test = Path("tests/test_saved_inventory_streamlit_runtime.py")
          runtime_test.write_text(
              '''from __future__ import annotations

from streamlit.testing.v1 import AppTest


def test_keyed_saved_inventory_expander_renders_without_runtime_errors() -> None:
    """Exercise the same keyed expander structure used by the production app."""
    app = AppTest.from_string(
        """
import streamlit as st

inventory = [
    {"name": "Patatas", "quantity": "3 unidades", "state": "En buen estado"},
    {"name": "Tomates", "quantity": "2 unidades", "state": "Revisar pronto"},
]

key_scope = "saved_inventory_top_editable"
with st.expander(
    "Alimentos guardados",
    expanded=False,
    key=f"{key_scope}_expander",
    width="stretch",
):
    columns = st.columns(2)
    for index, item in enumerate(inventory):
        with columns[index % 2]:
            with st.container(border=True):
                st.markdown(f"#### {item['name']}")
                st.button("✏️", key=f"edit_{index}")
                st.button("🗑️", key=f"delete_{index}")
                st.write(f"**Cantidad:** {item['quantity']}")
                st.write(f"**Estado:** {item['state']}")
        """,
        default_timeout=10,
    ).run()

    assert not app.exception
    assert len(app.expander) == 1
    assert app.expander[0].label == "Alimentos guardados"
    assert len(app.button) == 4
''',
              encoding="utf-8",
          )
          PY

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Validate browser components
        run: |
          node --check src/fridgechef/components/rear_camera/main.js
          node --check src/fridgechef/components/mobile_upload/main.js

      - name: Commit the validated hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streamlit_app/app.py tests/test_saved_inventory_expander.py tests/test_saved_inventory_streamlit_runtime.py
          if git diff --cached --quiet; then
            echo "The runtime hotfix is already materialized."
            exit 0
          fi
          git commit -m "Fix saved inventory expander runtime stability"
          git push origin HEAD:main
