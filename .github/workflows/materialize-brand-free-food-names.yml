name: Materialize brand-free food normalization

on:
  push:
    branches:
      - feat/brand-free-food-normalization

permissions:
  contents: write

jobs:
  materialize-test-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: feat/brand-free-food-normalization
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Materialize deterministic source changes
        run: python -m scripts.patch_brand_free_food_names

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Validate browser components
        run: |
          node --check src/fridgechef/components/rear_camera/main.js
          node --check src/fridgechef/components/mobile_upload/main.js

      - name: Commit validated application source through Git data API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          token = os.environ["GH_TOKEN"]
          api_root = f"https://api.github.com/repos/{repository}"

          def request(method: str, path: str, payload: dict | None = None) -> dict:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          encoded_branch = urllib.parse.quote(branch, safe="")
          ref = request("GET", f"/git/ref/heads/{encoded_branch}")
          parent_sha = ref["object"]["sha"]
          parent_commit = request("GET", f"/git/commits/{parent_sha}")

          paths = (
              "streamlit_app/app.py",
              "src/fridgechef/inventory.py",
              "src/fridgechef/recipe_planner.py",
              "src/fridgechef/vision.py",
              "src/fridgechef/text_parser.py",
          )
          tree_entries = []
          for file_path in paths:
              payload = base64.b64encode(Path(file_path).read_bytes()).decode("ascii")
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": payload, "encoding": "base64"},
              )
              tree_entries.append(
                  {"path": file_path, "mode": "100644", "type": "blob", "sha": blob["sha"]}
              )

          tree = request(
              "POST",
              "/git/trees",
              {"base_tree": parent_commit["tree"]["sha"], "tree": tree_entries},
          )
          commit = request(
              "POST",
              "/git/commits",
              {
                  "message": "Materialize brand-free food normalization flow",
                  "tree": tree["sha"],
                  "parents": [parent_sha],
              },
          )
          request(
              "PATCH",
              f"/git/refs/heads/{encoded_branch}",
              {"sha": commit["sha"], "force": False},
          )
          print(f"Materialized commit: {commit['sha']}")
          PY
