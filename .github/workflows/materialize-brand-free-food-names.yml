name: Materialize brand-free food normalization

on:
  push:
    branches:
      - feat/brand-free-food-normalization
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  materialize-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: feat/brand-free-food-normalization
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Materialize deterministic source changes
        run: python -m scripts.patch_brand_free_food_names

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Validate browser components
        run: |
          node --check src/fridgechef/components/rear_camera/main.js
          node --check src/fridgechef/components/mobile_upload/main.js

      - name: Publish materialized source
        uses: actions/upload-artifact@v4
        with:
          name: brand-free-materialized-source
          if-no-files-found: error
          retention-days: 1
          path: |
            streamlit_app/app.py
            src/fridgechef/inventory.py
            src/fridgechef/recipe_planner.py
            src/fridgechef/vision.py
            src/fridgechef/text_parser.py
