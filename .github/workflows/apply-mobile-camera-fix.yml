name: Apply mobile camera fix

on:
  push:
    paths:
      - '.github/workflows/apply-mobile-camera-fix.yml'
      - 'scripts/apply_mobile_camera_fix.py'
      - 'src/fridgechef/device_camera.py'
      - 'src/fridgechef/components/rear_camera/**'
      - 'src/fridgechef/ui_keys.py'
      - 'tests/test_device_camera.py'
      - 'tests/test_ui_keys.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Apply source patch
        run: python scripts/apply_mobile_camera_fix.py

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests

      - name: Commit generated application change
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streamlit_app/app.py
          git commit -m "Use rear mobile camera and unique inventory widget keys"
          git push
