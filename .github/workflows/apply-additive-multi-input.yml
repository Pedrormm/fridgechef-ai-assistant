name: Apply additive multi-input inventory

on:
  push:
    branches:
      - feature/additive-multi-input-inventory
    paths:
      - '.github/workflows/apply-additive-multi-input.yml'
      - 'scripts/patch_utils.py'
      - 'scripts/patch_multi_input_state.py'
      - 'scripts/patch_additive_quantity_ui.py'
      - 'scripts/patch_multi_input_analysis.py'
      - 'scripts/patch_multi_input_tabs.py'
      - 'scripts/patch_inventory_name_matching.py'
      - 'scripts/patch_replace_semantics.py'
      - 'src/fridgechef/input_pipeline.py'
      - 'src/fridgechef/inventory.py'
      - 'src/fridgechef/models.py'
      - 'src/fridgechef/name_matching.py'
      - 'src/fridgechef/quantities.py'
      - 'tests/test_app_multi_input_contract.py'
      - 'tests/test_inventory.py'
      - 'tests/test_name_matching.py'
      - 'tests/test_quantities.py'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Apply application patches
        run: |
          python -m scripts.patch_inventory_name_matching
          python -m scripts.patch_multi_input_state
          python -m scripts.patch_additive_quantity_ui
          python -m scripts.patch_multi_input_analysis
          python -m scripts.patch_multi_input_tabs
          python -m scripts.patch_replace_semantics

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Commit verified generated changes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add streamlit_app/app.py src/fridgechef/inventory.py
          git commit -m "Finalize additive multi-input inventory behavior"
          git push
