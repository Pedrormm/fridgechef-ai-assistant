name: FridgeChef CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fridgechef-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application-tests:
    name: Application tests and static validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Verify deterministic production source
        run: python -m scripts.patch_production_resilience

      - name: Verify collapsible recipe UI and recovered-provider logs
        run: python -m scripts.patch_collapsible_ingredients_and_logs

      - name: Verify brand-free food normalization
        run: python -m scripts.patch_brand_free_food_names

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Validate rear camera JavaScript
        run: node --check src/fridgechef/components/rear_camera/main.js

      - name: Validate mobile upload JavaScript
        run: node --check src/fridgechef/components/mobile_upload/main.js

      - name: Verify validation does not modify tracked files
        run: git diff --exit-code

  slim-runtime-tests:
    name: Python 3.11 slim runtime compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: application-tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build the production-compatible image
        run: docker build --pull --file Dockerfile --tag fridgechef-ci:${{ github.sha }} .

      - name: Run the complete suite inside the slim image
        run: docker run --rm --entrypoint python fridgechef-ci:${{ github.sha }} -m pytest -q

      - name: Compile source inside the slim image
        run: >-
          docker run --rm --entrypoint python fridgechef-ci:${{ github.sha }}
          -m compileall -q src streamlit_app tests scripts
