name: Materialize saved inventory expander on main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize-test-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Retrieve reviewed patch and tests
        run: |
          set -o pipefail
          git fetch --no-tags origin feat/collapsible-saved-inventory-v3 2>&1 | tee -a /tmp/saved-inventory-validation.log
          git checkout origin/feat/collapsible-saved-inventory-v3 -- scripts/patch_saved_inventory_expander.py 2>&1 | tee -a /tmp/saved-inventory-validation.log
          git checkout origin/feat/collapsible-saved-inventory-v3 -- tests/test_saved_inventory_expander.py 2>&1 | tee -a /tmp/saved-inventory-validation.log

      - name: Materialize application source
        run: |
          set -o pipefail
          python -m scripts.patch_saved_inventory_expander 2>&1 | tee -a /tmp/saved-inventory-validation.log
          python - <<'PY' 2>&1 | tee -a /tmp/saved-inventory-validation.log
          from pathlib import Path

          path = Path("tests/test_workflow_hygiene.py")
          source = path.read_text(encoding="utf-8")
          old = '    Path(".github/workflows/materialize-brand-free-food-names.yml"),\n'
          new = (
              old
              + '    Path(".github/workflows/materialize-saved-inventory-expander.yml"),\n'
              + '    Path(".github/workflows/materialize-saved-inventory-expander-main.yml"),\n'
          )
          if new not in source:
              if source.count(old) != 1:
                  raise RuntimeError("The workflow hygiene target has changed unexpectedly.")
              source = source.replace(old, new, 1)
          path.write_text(source, encoding="utf-8")
          PY
          rm .github/workflows/materialize-saved-inventory-expander-main.yml

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt 2>&1 | tee -a /tmp/saved-inventory-validation.log

      - name: Run complete test suite
        run: python -m pytest -q 2>&1 | tee -a /tmp/saved-inventory-validation.log

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts 2>&1 | tee -a /tmp/saved-inventory-validation.log

      - name: Validate browser components
        run: |
          set -o pipefail
          node --check src/fridgechef/components/rear_camera/main.js 2>&1 | tee -a /tmp/saved-inventory-validation.log
          node --check src/fridgechef/components/mobile_upload/main.js 2>&1 | tee -a /tmp/saved-inventory-validation.log

      - name: Create validated review branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY' 2>&1 | tee -a /tmp/saved-inventory-validation.log
          from __future__ import annotations

          import base64
          import json
          import os
          import urllib.error
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api_root = f"https://api.github.com/repos/{repository}"
          target_branch = "validated-saved-inventory-expander"

          def request(method: str, path: str, payload: dict | None = None) -> dict:
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              request_object = urllib.request.Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request_object, timeout=60) as response:
                  return json.loads(response.read().decode("utf-8"))

          ref = request("GET", "/git/ref/heads/main")
          parent_sha = ref["object"]["sha"]
          parent_commit = request("GET", f"/git/commits/{parent_sha}")

          paths = (
              "streamlit_app/app.py",
              ".github/workflows/apply-additive-multi-input.yml",
              "scripts/patch_saved_inventory_expander.py",
              "tests/test_saved_inventory_expander.py",
              "tests/test_workflow_hygiene.py",
          )
          tree_entries = []
          for file_path in paths:
              payload = base64.b64encode(Path(file_path).read_bytes()).decode("ascii")
              blob = request(
                  "POST",
                  "/git/blobs",
                  {"content": payload, "encoding": "base64"},
              )
              tree_entries.append(
                  {"path": file_path, "mode": "100644", "type": "blob", "sha": blob["sha"]}
              )

          tree_entries.append(
              {
                  "path": ".github/workflows/materialize-saved-inventory-expander-main.yml",
                  "mode": "100644",
                  "type": "blob",
                  "sha": None,
              }
          )

          tree = request(
              "POST",
              "/git/trees",
              {"base_tree": parent_commit["tree"]["sha"], "tree": tree_entries},
          )
          commit = request(
              "POST",
              "/git/commits",
              {
                  "message": "Collapse saved inventory by default",
                  "tree": tree["sha"],
                  "parents": [parent_sha],
              },
          )

          try:
              request(
                  "PATCH",
                  f"/git/refs/heads/{target_branch}",
                  {"sha": commit["sha"], "force": True},
              )
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              request(
                  "POST",
                  "/git/refs",
                  {"ref": f"refs/heads/{target_branch}", "sha": commit["sha"]},
              )

          Path("/tmp/validated-commit-sha.txt").write_text(
              commit["sha"] + "\n",
              encoding="utf-8",
          )
          print(f"Validated review branch: {target_branch}")
          print(f"Validated commit: {commit['sha']}")
          PY

      - name: Publish validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: saved-inventory-validated-branch
          path: |
            /tmp/saved-inventory-validation.log
            /tmp/validated-commit-sha.txt
          if-no-files-found: warn
          retention-days: 1
