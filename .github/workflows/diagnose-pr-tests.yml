name: Diagnose PR tests

on:
  push:
    branches:
      - fix/production-vision-images-persistence

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --requirement requirements.txt
      - name: Record test output
        run: |
          set +e
          python -m pytest -q --tb=short > /tmp/output.txt 2>&1
          status=$?
          tail -n 250 /tmp/output.txt > ci-test-summary.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ci-test-summary.txt
          git commit -m "Record current PR test diagnostics" || true
          git push || true
          exit $status
