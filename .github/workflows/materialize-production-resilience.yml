name: Materialize production resilience

on:
  push:
    branches:
      - fix/production-vision-images-persistence
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Materialize deterministic source changes
        run: python -m scripts.patch_production_resilience

      - name: Commit materialized source
        run: |
          if git diff --quiet; then
            echo "Source was already materialized."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add streamlit_app/app.py src/fridgechef/recipe_images.py
            git commit -m "Materialize production vision and recipe resilience"
            git push
          fi

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run complete test suite and capture diagnostics
        run: |
          set +e
          python -m pytest -q --tb=short > /tmp/pytest-output.txt 2>&1
          status=$?
          tail -n 240 /tmp/pytest-output.txt | tee materialization-test-summary.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add materialization-test-summary.txt
          git commit -m "Record production resilience test diagnostics" || true
          git push || true
          exit $status

      - name: Validate Python source
        run: python -m compileall -q src streamlit_app tests scripts

      - name: Validate browser components
        run: |
          node --check src/fridgechef/components/rear_camera/main.js
          node --check src/fridgechef/components/mobile_upload/main.js
